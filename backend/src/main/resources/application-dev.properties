# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE  # 需要看 SQL 参数时取消注释

# 文件上传 - 开发环境
app.file.upload-dir=./dev-uploads

# 跨域配置 - 开发环境
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
